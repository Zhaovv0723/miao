<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自由人小提问</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            min-height: 100vh;
            background: #f8eef6; /* 马卡龙淡粉底色 */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        /* 外层简约细线条浏览器边框 马卡龙浅灰边框 */
        .browser-wrap {
            width: min(1200px, 100%);
            height: min(850px, 90vh);
            border: 1px solid #d9cfe0;
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: #fff7fb; /* 马卡龙奶油粉 */
        }
        /* 浏览器顶部标题栏 */
        .browser-top {
            height: 38px;
            border-bottom: 1px solid #d9cfe0;
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 10px;
            background: #fef4f9;
        }
        /* 窗口控制马卡龙三色圆点 */
        .dot:nth-child(1) {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: #ffb8c6; /* 马卡龙浅粉 */
        }
        .dot:nth-child(2) {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: #b8e4ff; /* 马卡龙浅蓝 */
        }
        .dot:nth-child(3) {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: #e2c8ff; /* 马卡龙浅紫 */
        }
        /* 页面主体内容区域 */
        .page-content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        /* 初始提问页面 */
        .start-box {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 60px;
            transition: opacity 0.6s ease;
        }
        .question-text {
            font-size: clamp(1.8rem, 7vw, 3.2rem);
            color: #f278a1; /* 马卡龙深粉文字 */
            font-weight: bold;
            text-align: center;
            padding: 0 20px;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            padding: 0 15px;
        }
        button {
            padding: 16px 36px;
            font-size: clamp(1rem, 4vw, 1.4rem);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(242, 120, 161, 0.18);
        }
        .btn-know {
            background: #ffd6e3; /* 马卡龙浅粉按钮 */
            color: #d14b7b;
        }
        .btn-force {
            background: #f89abc; /* 马卡龙蜜桃粉按钮 */
            color: white;
        }
        button:hover {
            transform: scale(1.08);
        }
        /* 图片冒泡全屏容器 马卡龙浅粉底色 */
        .float-wrap {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: #fff0f7;
            display: none;
            overflow: hidden;
        }
        .bubble-img {
            position: absolute;
            width: min(210px, 40vw);
            pointer-events: none;
        }
        /* 底部上浮动画：无旋转，仅左右轻微偏移 */
        @keyframes bubbleUp {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-110vh) translateX(30px);
                opacity: 0;
            }
        }
        /* 点击瞬间铺满图片，带旋转上浮 */
        @keyframes initFloat {
            0% {
                opacity: 1;
                transform: rotate(0deg);
            }
            100% {
                transform: translateY(-110vh) translateX(-20px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- 外层马卡龙细边框框体 -->
    <div class="browser-wrap">
        <!-- 顶部仅保留三个马卡龙彩色圆点，无任何网址文字 -->
        <div class="browser-top">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
        <!-- 页面交互内容区域 -->
        <div class="page-content">
            <!-- 提问首页 -->
            <div class="start-box" id="startPage">
                <div class="question-text">你知道自由人怎么叫吗？</div>
                <div class="btn-group">
                    <button class="btn-know" onclick="openBubble()">知道</button>
                    <button class="btn-force" onclick="openBubble()">不知道也得知道</button>
                </div>
            </div>
            <!-- 图片冒泡区域 -->
            <div class="float-wrap" id="bubbleArea"></div>
        </div>
    </div>

    <script>
        const bubbleBox = document.getElementById("bubbleArea");

        // 持续底部冒出图片，不旋转、上浮速度快
        function createNewBubble() {
            const img = document.createElement("img");
            img.src = "m.png";
            img.className = "bubble-img";
            img.style.left = Math.random() * 90 + "%";
            img.style.bottom = "-210px";
            const speed = Math.random() * 4 + 4;
            img.style.animation = `bubbleUp ${speed}s linear forwards`;
            img.style.animationDelay = Math.random() * 1.5 + "s";
            bubbleBox.appendChild(img);
            img.addEventListener("animationend", () => {
                img.remove();
                createNewBubble();
            })
        }

        // 点击按钮瞬间铺满40张大图（带旋转）
        function fillScreenImg() {
            for(let i = 0; i < 40; i++){
                const img = document.createElement("img");
                img.src = "m.png";
                img.className = "bubble-img";
                img.style.left = Math.random() * 90 + "%";
                img.style.top = Math.random() * 80 + "%";
                const time = Math.random() * 6 + 5;
                img.style.animation = `initFloat ${time}s linear forwards`;
                bubbleBox.appendChild(img);
                img.addEventListener("animationend", () => img.remove());
            }
        }

        // 页面切换动画
        function openBubble() {
            document.getElementById("startPage").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("startPage").style.display = "none";
                bubbleBox.style.display = "block";
                fillScreenImg();
                for(let i = 0; i < 18; i++){
                    createNewBubble();
                }
            }, 600);
        }
    </script>
</body>
</html>
